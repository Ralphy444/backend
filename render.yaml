services:
  - type: web
    name: foodordering-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: False
      - key: DB_SSL
        value: False
      - key: PYTHON_VERSION
        value: 3.11.0
